defaults:
  - hpt_cotrain_enc_dec_base

robomimic_model:
  ac_keys:
    eve_bimanual: "actions_cartesian"
    aria_bimanual: "actions_cartesian"
  shared_ac_key: "actions_cartesian"

  head_specs:
    aria_bimanual: null
    eve_bimanual: null
    shared:
      _target_: egomimic.models.hpt_nets.MultiBlockTransformerDecoder
      input_dim: 256
      output_dim: 14
      action_horizon: 100
      latent_token_len: 8
      num_heads: 8
      dim_head: 64
      dropout: 0.1
      num_layers: 8
      final_norm: true

scheduler:
  _target_: torch.optim.lr_scheduler.LinearLR
  _partial_: true
  start_factor: 1
  end_factor: 1