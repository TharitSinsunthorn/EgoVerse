_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper
train_datasets:
  eva_bimanual:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.S3EpisodeResolver
      folder_path: /storage/project/r-dxu345-0/shared/pi_lang_pick_place_cotrain
      key_map:
        _target_: egomimic.rldb.embodiment.eva.Eva.get_keymap
        keymap_mode: cartesian
        annotation_key: annotations
      transform_list:
        _target_: egomimic.rldb.embodiment.eva.Eva.get_transform_list
    filters:
      _target_: egomimic.rldb.filters.ScaleAnnotationDatasetFilter
      project_name: "dense-language"
      filter_lambdas:
        - "lambda row: (row['robot_name'] == 'eva_bimanual') & (row['task'] == 'pick_place') & (row['zarr_processed_path'] != '')"
    mode: train
    valid_ratio: 0.05

valid_datasets:
  eva_bimanual:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.S3EpisodeResolver
      folder_path: /storage/project/r-dxu345-0/shared/pi_lang_pick_place_cotrain
      key_map:
        _target_: egomimic.rldb.embodiment.eva.Eva.get_keymap
        keymap_mode: cartesian
        annotation_key: annotations
      transform_list:
        _target_: egomimic.rldb.embodiment.eva.Eva.get_transform_list
    filters:
      _target_: egomimic.rldb.filters.ScaleAnnotationDatasetFilter
      project_name: "dense-language"
      filter_lambdas:
        - "lambda row: (row['robot_name'] == 'eva_bimanual') & (row['task'] == 'pick_place') & (row['zarr_processed_path'] != '')"
    mode: train
    valid_ratio: 0.05

use_tokenizer: true
model_name: "google/paligemma-3b-mix-224"
mode: "random"
annotation_key: "annotations"

train_dataloader_params:
  eva_bimanual:
    batch_size: 32
    num_workers: 6
valid_dataloader_params:
  eva_bimanual:
    batch_size: 32
    num_workers: 6