_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper
train_datasets:
  yam_bimanual:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.LocalEpisodeResolver
      folder_path: /home/tharit/EgoVerse/coc/flash7/scratch/raiden_datasets/cup_on_saucer

      key_map:
        _target_: egomimic.rldb.embodiment.yam.YAM.get_keymap
        keymap_mode: cartesian
      transform_list:
        _target_: egomimic.rldb.embodiment.yam.YAM.get_transform_list
        mode: cartesian
    filters:
      _target_: egomimic.rldb.filters.DatasetFilter
      filter_lambdas:
        - "lambda row: row['embodiment'] == 'yam_bimanual'"
        - "lambda row: row['task'] == 'cup_on_saucer'"
    mode: total

valid_datasets:
  yam_bimanual:
    _target_: egomimic.rldb.zarr.zarr_dataset_multi.MultiDataset._from_resolver
    resolver:
      _target_: egomimic.rldb.zarr.zarr_dataset_multi.LocalEpisodeResolver
      folder_path: /home/tharit/EgoVerse/coc/flash7/scratch/raiden_datasets/cup_on_saucer

      key_map:
        _target_: egomimic.rldb.embodiment.yam.YAM.get_keymap
        keymap_mode: cartesian
      transform_list:
        _target_: egomimic.rldb.embodiment.yam.YAM.get_transform_list
        mode: cartesian
    filters:
      _target_: egomimic.rldb.filters.DatasetFilter
      filter_lambdas:
        - "lambda row: row['embodiment'] == 'yam_bimanual'"
        - "lambda row: row['task'] == 'cup_on_saucer'"
    mode: total

train_dataloader_params:
  yam_bimanual:
    batch_size: 32
    num_workers: 6
valid_dataloader_params:
  yam_bimanual:
    batch_size: 32
    num_workers: 6
