defaults:
  - hpt_cotrain_enc_dec_base

robomimic_model:
  domains: ["eve_bimanual", "aria_bimanual"]
  diffusion: true 
  head_specs:
    shared: null
    aria_bimanual:
      _target_: egomimic.models.diffusion_policy.DiffusionPolicy
      infer_ac_dims:
        aria_bimanual: 12
      action_horizon: 100
      pooling: "flatten"
      num_inference_steps: 100
      model:
        _target_:  egomimic.models.denoising_nets.ConditionalUnet1D
        input_dim: 12
        cond_dim: 256
        ac_latent_seq: 8
        diffusion_step_embed_dim: 256
        down_dims: [64, 128, 256]
        kernel_size: 3
        n_groups: 8
        cond_predict_scale: True

      noise_scheduler:
        _target_: egomimic.models.ddim_scheduler.DDIMScheduler
        num_train_timesteps: 300
        beta_start: 0.0001
        beta_end: 0.02
        beta_schedule: squaredcos_cap_v2
        clip_sample: True
        set_alpha_to_one: True
        steps_offset: 0
        prediction_type: epsilon
    
    eve_bimanual:
      _target_: egomimic.models.diffusion_policy.DiffusionPolicy
      infer_ac_dims:
        eve_bimanual: 14
      action_horizon: 100
      pooling: "flatten"
      num_inference_steps: 100
      model:
        _target_:  egomimic.models.denoising_nets.ConditionalUnet1D
        input_dim: 14
        cond_dim: 256
        ac_latent_seq: 8
        diffusion_step_embed_dim: 256
        down_dims: [64, 128, 256]
        kernel_size: 3
        n_groups: 8
        cond_predict_scale: True

      noise_scheduler:
        _target_: egomimic.models.ddim_scheduler.DDIMScheduler
        num_train_timesteps: 300
        beta_start: 0.0001
        beta_end: 0.02
        beta_schedule: squaredcos_cap_v2
        clip_sample: True
        set_alpha_to_one: True
        steps_offset: 0
        prediction_type: epsilon

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 3e-4
  weight_decay: 0.001

scheduler:
  _target_: torch.optim.lr_scheduler.CosineAnnealingLR
  _partial_: true
  T_max: 2000
  eta_min: 1e-5