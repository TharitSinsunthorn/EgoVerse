_target_: egomimic.pl_utils.pl_model.ModelWrapper
robomimic_model:
  _target_: egomimic.algo.pi.PI
  data_schematic: _${data.dataset.data_schematic}
  config:      
    pytorch_training_precision: bfloat16
    pytorch_weight_path: /storage/home/hcoda1/4/paphiwetsa3/r-dxu345-0/projects/EgoVerse/egomimic/algo/pi_checkpoints/pi05_base_pytorch
    model:
      pi05: true
      action_dim: 32
      action_horizon: 100
      max_token_len: 180

  train_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.Resize
        size: 224
        interpolation: 3
  eval_image_augs:
    _target_: torchvision.transforms.Compose
    transforms:
      - _target_: torchvision.transforms.Resize
        size: 224
        interpolation: 3

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 2e-5
  betas: [0.9, 0.999]
  eps: 1e-8
  weight_decay: 0.0

scheduler:
  _target_: transformers.get_cosine_schedule_with_warmup
  _partial_: true
  num_warmup_steps: 2000
  num_training_steps: 40000
  num_cycles: 0.5

scheduler_interval: step