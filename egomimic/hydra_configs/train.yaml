defaults:
  - model: hpt
  - paths: default
  - trainer: ddp
  - debug: null
  - logger: wandb
  - data: multi_data
  - override hydra/launcher: submitit
  - _self_

name: test
description: test
ckpt_path: null
train: true
eval: false

hydra:
  run:
    # Dir should be experiment_name/description_{timestamp}
    dir: ./logs/${name}/${description}_${now:%Y-%m-%d_%H-%M-%S}
  sweep:
    dir: ./logs/${name}/${description}_${now:%Y-%m-%d_%H-%M-%S}

launch_params:
  gpus_per_node: 1
  nodes: 1

data_schematic: # Dynamically fill in these shapes from the dataset
  _target_: rldb.utils.DataSchematic
  schematic_dict:
    eve_bimanual:
      front_img_1: #batch key
        key_type: camera_keys # key type
        lerobot_key: observations.images.front_img_1 # dataset key
      right_wrist_img:
        key_type: camera_keys
        lerobot_key: observations.images.right_wrist_img
      left_wrist_img:
        key_type: camera_keys
        lerobot_key: observations.images.left_wrist_img
      joint_positions:
        key_type: proprio_keys
        lerobot_key: observations.state.joint_positions
      actions_joints:
        key_type: action_keys
        lerobot_key: actions_joints
      embodiment:
        key_type: metadata_keys
        lerobot_key: metadata.embodiment
    aria_bimanual:
      front_img_1:
        key_type: camera_keys
        lerobot_key: observations.images.front_img_1
      ee_pose:
        key_type: proprio_keys
        lerobot_key: observations.state.ee_pose
      actions_cartesian:
        key_type: action_keys
        lerobot_key: actions_cartesian
      embodiment:
        key_type: metadata_keys
        lerobot_key: metadata.embodiment
  viz_img_key: 
    eve_bimanual:
      front_img_1
    aria_bimanual:
      front_img_1
