_target_: egomimic.pl_utils.pl_data_utils.MultiDataModuleWrapper

train_datasets:
  dataset1:
    _target_: rldb.utils.S3RLDBDataset
    bucket_name: "rldb"
    mode: train
    embodiment: "aria_bimanual"
    filters: 
      operator: "Aniketh"
      lab: "rl2"
      scene: "12"
      task: "fold clothes"
    local_files_only: True

valid_datasets:
  dataset1:
    _target_: rldb.utils.S3RLDBDataset
    bucket_name: "rldb"
    mode: valid
    embodiment: "aria_bimanual"
    filters: 
      operator: "Aniketh"
      lab: "rl2"
      scene: "12"
      task: "fold clothes"
    local_files_only: True

train_dataloader_params:
  dataset1:
    batch_size: 32
    num_workers: 10

valid_dataloader_params:
  dataset1:
    batch_size: 32
    num_workers: 10